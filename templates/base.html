<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi Plataforma E-Learning</title>
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    rel="stylesheet"
  >
  <!-- Tu CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    /* Estilos para toda la app */
    .sidebar { 
      width: 220px; 
      min-height: 100vh; 
      background:rgb(37, 91, 147); 
      color: #fff; 
      display: flex; 
      flex-direction: column; 
      padding: 1rem;
    }
    .sidebar .nav-link {
      color: rgba(255,255,255,.9);
      margin-bottom: .5rem;
    }
    .sidebar .nav-link:hover {
      color: #fff;
      text-decoration: none;
    }
    .sidebar .btn-generate {
      margin-top: auto;
    }
  </style>
</head>
<body class="d-flex">


  <!-- Main Content -->
  <main class="flex-grow-1 d-flex flex-column">

    <!-- Header -->
    <header class="bg-light p-3">
      <h1 class="h5 mb-0">Encabezado general</h1>
    </header>

    <!-- Dinámico: cada plantilla inyecta aquí su contenido -->
    <div class="p-4 flex-grow-1">
      {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer class="bg-light text-center p-3">
      <small>© 2025 Mi Plataforma E-Learning</small>
    </footer>

  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
